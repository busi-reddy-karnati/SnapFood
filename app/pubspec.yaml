name: snapfood
description: SnapFood — household meal planning from text, voice, or photo.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.0
  speech_to_text: ^7.0.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
